name: Deploy Database Rules

# Manually-triggered deploy of database.rules.json to the Realtime Database,
# using the same service account as hosting. Kept separate from app deploys so
# rule changes are always an explicit, deliberate action.

on:
  workflow_dispatch:

jobs:
  rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Write service account key
        run: printf '%s' "$SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KIDS_CORNER_45FC2 }}
      - name: Deploy database rules
        run: npx firebase-tools@latest deploy --only database --project kids-corner-45fc2 --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
