<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Not on your list yet</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Nunito", system-ui, -apple-system, sans-serif;
        color: #2a1a3e;
        background:
          radial-gradient(1000px 500px at 10% -10%, #fff3d6 0%, transparent 55%),
          radial-gradient(900px 500px at 100% 0%, #ffe1ec 0%, transparent 50%),
          linear-gradient(180deg, #fef6ff 0%, #eef4ff 100%);
      }
      .card {
        width: min(460px, 100%);
        background: #fff;
        border-radius: 28px;
        box-shadow: 0 14px 30px -16px rgba(60, 20, 80, 0.35);
        padding: 32px 28px;
        text-align: center;
      }
      .emoji { font-size: 3.4rem; }
      h1 { font-size: 1.5rem; margin: 10px 0 6px; }
      p { color: #6b5b7e; font-weight: 600; margin: 0 0 6px; }
      .host { font-weight: 800; color: #2a1a3e; word-break: break-all; }
      a.btn {
        display: inline-block;
        margin-top: 18px;
        text-decoration: none;
        background: linear-gradient(135deg, #ff8a3d, #ff3d77);
        color: #fff;
        font-weight: 800;
        border-radius: 999px;
        padding: 14px 22px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="emoji">🛡️</div>
      <h1>That site isn't on your list yet</h1>
      <p><span class="host" id="host">This page</span> isn't one of your learning apps.</p>
      <p>Ask a grown-up if you need it — they can add it in Kids Corner.</p>
      <a class="btn" href="https://kids-corner-45fc2.firebaseapp.com/">← Back to Kids Corner</a>
    </div>
    <script src="blocked.js"></script>
  </body>
</html>
